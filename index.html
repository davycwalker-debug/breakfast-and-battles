<!DOCTYPE html>
<html>
<head>
    <title>My Interactive World Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-groupedlayercontrol/0.6.1/leaflet.groupedlayercontrol.min.css"/>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-groupedlayercontrol/0.6.1/leaflet.groupedlayercontrol.min.js"></script>

    <style>
        html, body, #map {
            width: 100%; height: 100%; margin: 0; padding: 0;
            background-color: #1a1a1a; overflow: hidden;
        }

        /* Premium Dark Mode Popups */
        .leaflet-popup-content-wrapper {
            background: #232323; color: white; border-radius: 14px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.45);
        }
        .leaflet-popup-tip { background: #232323; }

        /* Coordinate HUD Widget */
        #coords {
            position: absolute; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(20,20,20,0.85); color: white; padding: 10px 14px;
            border-radius: 12px; font-family: sans-serif; font-size: 14px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35); pointer-events: none;
        }

        /* Click Ripple Vector Animation */
        .click-ripple {
            width: 18px; height: 18px; border-radius: 50%;
            background: rgba(0, 140, 255, 0.8); position: absolute;
            transform: translate(-50%, -50%); animation: ripple 0.8s ease-out forwards;
            pointer-events: none;
        }
        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="coords">Click anywhere on the map</div>

<script>
    // --- MAP CONFIGURATION & METADATA CATALOUGE ---
    const imgWidth = 2000;
    const imgHeight = 1500;
    const imgUrl = 'https://github.com/davycwalker-debug/breakfast-and-battles/blob/main/faerun_medium.png?raw=true';

    // All category layout designs centralized here
    const mapConfiguration = {
        city:     { label: "Cities",    color: "#ffd166", icon: "🏰", size: 26, glow: "rgba(255,209,102,0.8)" },
        town:     { label: "Towns",     color: "#f4a261", icon: "🏠", size: 22, glow: "rgba(244,162,97,0.8)" },
        ruin:     { label: "Ruins",     color: "#9e9e9e", icon: "🪦", size: 24, glow: "rgba(180,180,180,0.7)" },
        forest:   { label: "Forests",   color: "#2a9d8f", icon: "🌲", size: 24, glow: "rgba(42,157,143,0.8)" },
        swamp:    { label: "Swamps",    color: "#556b2f", icon: "🦟", size: 24, glow: "rgba(85,107,47,0.8)" },
        road:     { label: "Roads",     color: "#c2b280", icon: "🛤️", size: 18, glow: "rgba(194,178,128,0.6)" },
        mountain: { label: "Mountains", color: "#8d99ae", icon: "⛰️", size: 28, glow: "rgba(141,153,174,0.8)" },
        region:   { label: "Regions",   color: "#b5179e", icon: "🗺️", size: 30, glow: "rgba(181,23,158,0.8)" },
        dungeon:  { label: "Dungeons",  color: "#d62828", icon: "⚔️", size: 26, glow: "rgba(214,40,40,0.8)" },
        body:     { label: "Bodies",    color: "#4cc9f0", icon: "🌊", size: 26, glow: "rgba(76,201,240,0.8)" },
        river:    { label: "Rivers",    color: "#4895ef", icon: "💧", size: 20, glow: "rgba(72,149,239,0.8)" },
        feature:  { label: "Features",  color: "#adb5bd", icon: "🪨", size: 24, glow: "rgba(173,181,189,0.8)" }
    };

    // --- LEAFLET INITIALIZATION ---
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1,
        maxZoom: 5,
        zoomSnap: 0.25,
        doubleClickZoom: false
    });

    const bounds = [[0, 0], [imgHeight, imgWidth]];
    L.imageOverlay(imgUrl, bounds).addTo(map);
    map.fitBounds(bounds);

    // --- AUTOMATIC DYNAMIC LAYER BUILDING ---
    const layers = { encountered: {}, unencountered: {} };
    const groupedOverlays = { "Encountered": {}, "Unencountered": {} };

    // Spin through the catalogue to instantiate everything dynamically
    Object.keys(mapConfiguration).forEach(key => {
        const item = mapConfiguration[key];
        
        layers.encountered[key] = L.layerGroup();
        layers.unencountered[key] = L.layerGroup();

        groupedOverlays["Encountered"][item.label] = layers.encountered[key];
        groupedOverlays["Unencountered"][item.label] = layers.unencountered[key];
    });

    // --- MARKER CONSTRUCTOR ENGINE ---
    function addMarker(type, encountered, y, x, popupText, notionUrl) {
        const style = mapConfiguration[type];
        if (!style) return;

        const icon = L.divIcon({
            className: '',
            html: `
                <div style="
                    width:${style.size}px; height:${style.size}px;
                    border-radius:50%; background:${style.color};
                    display:flex; align-items:center; justify-content:center;
                    font-size:${style.size * 0.65}px; border:2px solid white;
                    box-shadow: 0 0 12px ${style.glow}, 0 0 30px ${style.glow};
                ">
                    ${style.icon}
                </div>
            `,
            iconSize: [style.size, style.size],
            iconAnchor: [style.size / 2, style.size / 2]
        });

        const marker = L.marker([y, x], { icon });

        // 1. Bind the popup with a dark-mode friendly setup, ensuring it doesn't fight our hover logic
        marker.bindPopup(`
            <div style="font-family: sans-serif; text-align: center;">
                <h3>${popupText}</h3>
            </div>
        `, {
            closeButton: false, // Removes the 'x' button for a cleaner aesthetic
            autoClose: true     // Automatically shuts if another map element takes focus
        });

        // STABLE HOVER ENGINE: Instant reactions without DOM element validation loops
        marker.on('mouseenter', function () {
            this.openPopup();
        });

        marker.on('mouseleave', function () {
            setTimeout(() => {
                const popup = this.getPopup();
                if (popup && popup.getElement()) {
                    const isHoveringPopup = popup.getElement().matches(':hover');
                    const isHoveringMarker = marker.getElement() && marker.getElement().matches(':hover');
                    
                    if (!isHoveringPopup && !isHoveringMarker) {
                        this.closePopup();
                    }
                    
                    // Bind the click redirect rule natively to the popup element frame safely
                    popup.getElement().onclick = function() {
                        window.open(notionUrl, '_blank');
                    };
                } else {
                    this.closePopup();
                }
            }, 120);
        });

        // DIRECT MARKER CLICK TRIGGER
        marker.on('click', function() {
            window.open(notionUrl, '_blank');
        });

        const state = encountered ? "encountered" : "unencountered";
        marker.addTo(layers[state][type]);
        return marker;
    }

    // --- YOUR CAMPAIGN DATA REGISTER ---
    addMarker("city", true, 750, 1000, "Capital City", "https://notion.so/page1");
    addMarker("dungeon", false, 400, 1300, "The Buried Crypt", "https://notion.so/page2");
    addMarker("mountain", true, 250, 700, "Iron Peaks", "https://notion.so/page3");

    // Initialize Layer Control Panel
    L.control.groupedLayers(null, groupedOverlays, {
        collapsed: false,
        groupCheckboxes: true
    }).addTo(map);

    // --- INTERACTIVE MOUSE INTERACTIONS ---
    map.on('click', function(e) {
        // UI HUD Refresh
        document.getElementById('coords').innerHTML = `
            <strong>X:</strong> ${Math.round(e.latlng.lng)} &nbsp;&nbsp;
            <strong>Y:</strong> ${Math.round(e.latlng.lat)}
        `;

        // Interactive Element Injection (Ripple)
        const point = map.latLngToContainerPoint(e.latlng);
        const ripple = document.createElement('div');
        ripple.className = 'click-ripple';
        ripple.style.left = point.x + 'px';
        ripple.style.top = point.y + 'px';

        document.body.appendChild(ripple);
        setTimeout(() => { ripple.remove(); }, 800);
    });
</script>

</body>
</html>
