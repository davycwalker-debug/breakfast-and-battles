                    prompt: "What is the Gulthias Tree?",
                    speaker: "Belak",

                {
                    prompt: "What did you do to the other adventurers?",
                    speaker: "Belak",
                    response: "The first two… Ah, such exquisite examples! The Tree has ‘accepted’ them, yes, yes! And now, they belong to me, like my little marionettes. You cannot save them, not now… not ever… unless, of course, you join the dance!"

                { name: "Sir Braford", initRoll: 2, hp: 14, maxHp: 14, ac: "25", saves: "+7 / +2 / +5", type: "Med Humanoid", bio: "Corrupt Supplicant warden. Wields an Illuminating Silver Longsword +1. Intercepts threats directly." },

            development: "Supplicant Bindings: Any sentient humanoid bound to the tree is fully absorbed over 24 hours. They emerge 1 hour later as unredeemable thralls with permanent barkskin supernatural traits. If the tree dies, the thralls dissolve into ash instantly.",

            specialEvents: [

                            type: "Will Save (Mindslip Overwhelm)",
