              "title": "The Return of Gulthias",
              "trigger": "If Erky is alive at the end of the encounter.",
              "readAloud": `For a moment, there is only the sharp crack of splintering wood. The great tree, once towering, once terrible, now lies broken across the cavern floor. 
              Thick, black sap seeps slowly from the shattered stump, pooling into the soil like something too heavy to flow quickly. 
              A pale fog begins to rise from the earth, curling low around the roots. <br><br>
              Erky Timbers brushes some dirt off his little cloak and steps forward, peering at the ruined stump with bright, fascinated eyes. 
              ‘Well now,’ he says softly, almost to himself. ‘Would ya look at that.’ He turns towards you with a wide, grateful smile. ‘Friends… I do believe we’ve done it!’ <br><br>
              He clasps his hands together. 
              ‘Truly, I can’t thank y’all enough. I know it must’ve seemed off, the way I kept insisting the tree had to go. But, well, you see—’ 
              Erky gestures towards the stump ‘—this wasn’t just any old evil tree.’ 
              The fog thickens around his boots. ‘It was a stake.’ He says it with cheerful matter-of-factness. 
              ‘Driven straight through the heart of a rather important fellow.’ <br><br>
              The ground begins to tremble faintly, as loose dirt slides towards the shattered roots. Erky continues, almost conversationally. 
              ‘Oh, he was buried here centuries ago, you see. Head chopped clean off, stuffed full of holy wafers, stake through the heart, the whole nine yards. 
              Very thorough job, that. But…’ he tilts his head with a sympathetic shrug. ‘Not quite thorough enough. What can you do, you know?’ <br><br>
              The trembling grows stronger as pebbles lift from the ground and the fog spills upwards in coils. Erky spreads his arms happily. 
              ‘Y’all have helped me finish a pilgrimage I’ve been working on for a very, very long time.’ He then inhales sharply and closes his eyes. 
              For a moment, he concentrates. His body stiffens, and a faint tremor runs through him as he draws inward, gathering focus. ‘Just one… more… little… There we go.’ <br><br>
              He exhales, and the air pulses. A ripple of unseen force sinks into the earth beneath the ruined tree as the ground erupts. 
              Dirt explodes upward in a violent telekinetic blast. Roots tear free of the soil and hang suspended in the air as if caught in an invisible current. <br><br>
              And then, from the crater, something stirs… a figure rising as if drawn by invisible strings. Tall, pale, perfectly rigid, arms crossed tightly over its chest. 
              At its center, a ragged cavity marks where something once pierced its heart; the neck ends abruptly, a cruel stub where a head once sat. <br><br>
              Erky drops immediately to his knees. ‘Oh my,’ he whispers reverently. Gas swirls through the air around the corpse’s shoulders like dark smoke, gathering at the ruined neck. 
              Muscle forms first, then bone, then skin. Long brown hair spills down over muscled shoulders as a face slowly emerges from the fog. 
              When the process finishes, the man hovering above the crater reaches up and casually cracks his neck. <br><br>
              The man exhales. ‘Ahh,’ he says, his voice smooth, warm, and faintly amused. ‘Now that was an unpleasant nap.’ 
              He slowly lowers himself to the ground, and the dirt and stones hanging in the air fall with a soft patter.  
              He dusts off his black coat, then pulls a pair of bright pink sunglasses from his pocket and slips them on. <br><br>
              His gaze sweeps across you with mild curiosity before landing on the kneeling gnome. ‘Well,’ he says casually. ‘This is new.’ 
              Erky bows low, forehead nearly touching the dirt. ‘M-my lord Gulthias! It is an honor beyond words!’ Gulthias tilts his head slightly. ‘Is it now.’ <br><br>
              ‘Oh, yes, sir!’ Erky says eagerly. ‘I’m the one who freed you! Tracked your story for years — old cult writings in the vale, bits of dragon lore in the wastes… wonderful stuff.

              Gulthias seems to consider this. For a long moment, he simply stares at Erky over the rim of his sunglasses. ‘Joining,’ Gulthias says thoughtfully.

              Gulthias moves. One moment, he’s standing several feet away; the next, he’s holding Erky by the collar. 
              The gnome barely has time to yelp before Gulthias bites down on his neck. <br><br>
