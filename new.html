<!DOCTYPE html>
<html>
<head>
    <title>My Interactive World Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        /* Pretty popup styling */
        .leaflet-popup-content-wrapper {
            background: #232323;
            color: white;
            border-radius: 14px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.45);
        }

        .leaflet-popup-tip {
            background: #232323;
        }

        /* Coordinate HUD */
        #coords {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(20,20,20,0.85);
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        /* Ripple animation */
        .click-ripple {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0, 140, 255, 0.8);
            position: absolute;
            transform: translate(-50%, -50%);
            animation: ripple 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes ripple {
            0% {
                transform: translate(-50%, -50%) scale(0.4);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(5);
                opacity: 0;
            }
        }

        /* Custom marker glow */
        .custom-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00aaff;
            border: 2px solid white;
            box-shadow:
                0 0 12px rgba(0,170,255,0.9),
                0 0 30px rgba(0,170,255,0.5);
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="coords">Click anywhere on the map</div>

<script>

    const imgWidth = 2000;
    const imgHeight = 1500;
    const imgUrl = 'https://github.com/davycwalker-debug/breakfast-and-battles/blob/main/faerun_medium.png?raw=true';

    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -2,
        maxZoom: 2,
        zoomSnap: 0.25
    });

    const bounds = [[0, 0], [imgHeight, imgWidth]];
    L.imageOverlay(imgUrl, bounds).addTo(map);
    map.fitBounds(bounds);

    // Pretty marker helper
    function addNotionMarker(y, x, popupText, notionUrl) {

        const icon = L.divIcon({
            className: '',
            html: `<div class="custom-marker"></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        });

        const marker = L.marker([y, x], { icon }).addTo(map);

        const popupContent = `
            <div style="font-family:sans-serif;text-align:center;padding:4px;">
                <h3 style="margin:0 0 10px 0;">${popupText}</h3>
                <a href="${notionUrl}"
                   target="_blank"
                   style="
                        color:#4db8ff;
                        text-decoration:none;
                        font-weight:bold;
                   ">
                    Open Entry in Notion ➔
                </a>
            </div>
        `;

        marker.bindPopup(popupContent);
    }

    addNotionMarker(
        750,
        1000,
        "Capital City",
        "https://www.notion.so/your-page-id-1"
    );

    // PRETTY CLICK INTERACTION
    map.on('click', function(e) {

        // Update coordinate display
        document.getElementById('coords').innerHTML = `
            <strong>X:</strong> ${Math.round(e.latlng.lng)}
            &nbsp;&nbsp;
            <strong>Y:</strong> ${Math.round(e.latlng.lat)}
        `;

        // Ripple effect
        const point = map.latLngToContainerPoint(e.latlng);

        const ripple = document.createElement('div');
        ripple.className = 'click-ripple';

        ripple.style.left = point.x + 'px';
        ripple.style.top = point.y + 'px';

        document.body.appendChild(ripple);

        setTimeout(() => {
            ripple.remove();
        }, 800);

    });

</script>

</body>
</html>
