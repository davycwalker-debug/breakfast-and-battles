<!DOCTYPE html>
<html>
<head>
    <title>My Interactive World Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-groupedlayercontrol/0.6.1/leaflet.groupedlayercontrol.min.css"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-groupedlayercontrol/0.6.1/leaflet.groupedlayercontrol.min.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        /* Pretty popup styling */
        .leaflet-popup-content-wrapper {
            background: #232323;
            color: white;
            border-radius: 14px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.45);
        }

        .leaflet-popup-tip {
            background: #232323;
        }

        /* Coordinate HUD */
        #coords {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(20,20,20,0.85);
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        /* Ripple animation */
        .click-ripple {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0, 140, 255, 0.8);
            position: absolute;
            transform: translate(-50%, -50%);
            animation: ripple 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes ripple {
            0% {
                transform: translate(-50%, -50%) scale(0.4);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(5);
                opacity: 0;
            }
        }

        /* Custom marker glow */
        .custom-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00aaff;
            border: 2px solid white;
            box-shadow:
                0 0 12px rgba(0,170,255,0.9),
                0 0 30px rgba(0,170,255,0.5);
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="coords">Click anywhere on the map</div>

<script>
    const imgWidth = 2000;
    const imgHeight = 1500;
    const imgUrl = 'https://github.com/davycwalker-debug/breakfast-and-battles/blob/main/faerun_medium.png?raw=true';

    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1,
        maxZoom: 5,
        zoomSnap: 0.25
    });

    const bounds = [[0, 0], [imgHeight, imgWidth]];
    L.imageOverlay(imgUrl, bounds).addTo(map);
    map.fitBounds(bounds);

    // Color matrix used to tint custom markers dynamically
    const markerStyles = {
        city: {color: "#ffd166"},    
        town: {color: "#f4a261"},    
        ruin: {color: "#9e9e9e"},    
        forest: {color: "#2a9d8f"},    
        swamp: {color: "#556b2f"},    
        road: {color: "#c2b280"},    
        mountain: {color: "#8d99ae"},
        region: {color: "#b5179e"},
        dungeon: {color: "#d62828"},
        body: {color: "#4cc9f0"},
        river: {color: "#4895ef"},
        feature: {color: "#adb5bd"}
    };

    const layers = {
        encountered: {
            city: L.layerGroup(), town: L.layerGroup(), ruin: L.layerGroup(),
            forest: L.layerGroup(), swamp: L.layerGroup(), road: L.layerGroup(),
            mountain: L.layerGroup(), region: L.layerGroup(), dungeon: L.layerGroup(),
            body: L.layerGroup(), river: L.layerGroup(), feature: L.layerGroup()
        },
        unencountered: {
            city: L.layerGroup(), town: L.layerGroup(), ruin: L.layerGroup(),
            forest: L.layerGroup(), swamp: L.layerGroup(), road: L.layerGroup(),
            mountain: L.layerGroup(), region: L.layerGroup(), dungeon: L.layerGroup(),
            body: L.layerGroup(), river: L.layerGroup(), feature: L.layerGroup()
        }
    };

    const groupedOverlays = {
        "Encountered": {
            "Cities": layers.encountered.city,
            "Towns": layers.encountered.town,
            "Ruins": layers.encountered.ruin,
            "Forests": layers.encountered.forest,
            "Swamps": layers.encountered.swamp,
            "Roads": layers.encountered.road,
            "Mountains": layers.encountered.mountain,
            "Regions": layers.encountered.region,
            "Dungeons": layers.encountered.dungeon,
            "Bodies": layers.encountered.body,
            "Rivers": layers.encountered.river,
            "Features": layers.encountered.feature
        },
        "Unencountered": {
            "Cities": layers.unencountered.city,
            "Towns": layers.unencountered.town,
            "Ruins": layers.unencountered.ruin,
            "Forests": layers.unencountered.forest,
            "Swamps": layers.unencountered.swamp,
            "Roads": layers.unencountered.road,
            "Mountains": layers.unencountered.mountain,
            "Regions": layers.unencountered.region,
            "Dungeons": layers.unencountered.dungeon,
            "Bodies": layers.unencountered.body,
            "Rivers": layers.unencountered.river,
            "Features": layers.unencountered.feature
        }
    };

    function addNotionMarker(type, encountered, y, x, popupText, notionUrl) {
        // Fetch color from style object, default to feature grey if missing
        const markerColor = markerStyles[type] ? markerStyles[type].color : "#adb5bd";

        // Using L.circleMarker to apply custom color styling and glowing profiles
        const marker = L.circleMarker([y, x], {
            radius: 8,
            fillColor: markerColor,
            color: "#ffffff",  // Border color
            weight: 2,         // Border thickness
            opacity: 1,
            fillOpacity: 0.9
        });

        const popupContent = `
            <div style="font-family: sans-serif; text-align: center;">
                <h3 style="margin: 0 0 8px 0; font-size: 16px;">${popupText}</h3>
                <a href="${notionUrl}" target="_blank" style="color: #00aaff; text-decoration: none; font-weight: bold; font-size: 13px;">Open Entry in Notion ➔</a>
            </div>
        `;
        marker.bindPopup(popupContent);
        
        const state = encountered ? "encountered" : "unencountered";
        
        // Add to the tracking layer group ONLY. Do NOT call .addTo(map) here.
        // This keeps them hidden until the user manually toggles the UI checkbox.
        marker.addTo(layers[state][type]);
        
        return marker;
    }

    // --- DATA REGISTER ---
    addNotionMarker("city", true, 750, 1000, "Capital City", "https://notion.so/page1");
    addNotionMarker("dungeon", false, 400, 1300, "The Buried Crypt", "https://notion.so/page2");
    addNotionMarker("mountain", true, 250, 700, "Iron Peaks", "https://notion.so/page3");

    // Initialize Layer Control
    L.control.groupedLayers(null, groupedOverlays, {
        collapsed: false,
        groupCheckboxes: true
    }).addTo(map);

    // --- INTERACTIVE FEATURES ---
    map.on('click', function(e) {
        // Update coordinate display
        document.getElementById('coords').innerHTML = `
            <strong>X:</strong> ${Math.round(e.latlng.lng)}
            &nbsp;&nbsp;
            <strong>Y:</strong> ${Math.round(e.latlng.lat)}
        `;

        // Interactive ripple calculation
        const point = map.latLngToContainerPoint(e.latlng);
        const ripple = document.createElement('div');
        ripple.className = 'click-ripple';
        ripple.style.left = point.x + 'px';
        ripple.style.top = point.y + 'px';

        document.body.appendChild(ripple);
        setTimeout(() => { ripple.remove(); }, 800);
    });
</script>
</body>
</html>
