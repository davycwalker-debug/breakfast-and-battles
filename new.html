<!DOCTYPE html>
<html>
<head>
    <title>My Interactive World Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-groupedlayercontrol/0.6.1/leaflet.groupedlayercontrol.min.css"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-groupedlayercontrol/0.6.1/leaflet.groupedlayercontrol.min.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        /* Pretty popup styling */
        .leaflet-popup-content-wrapper {
            background: #232323;
            color: white;
            border-radius: 14px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.45);
        }

        .leaflet-popup-tip {
            background: #232323;
        }

        .leaflet-marker-icon {
            transition:
                transform 0.15s ease,
                filter 0.15s ease;
        }
        
        .leaflet-marker-icon:hover {
            transform: scale(1.15);
            z-index: 1000 !important;
        }

        /* Coordinate HUD */
        #coords {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(20,20,20,0.85);
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        /* Ripple animation */
        .click-ripple {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0, 140, 255, 0.8);
            position: absolute;
            transform: translate(-50%, -50%);
            animation: ripple 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes ripple {
            0% {
                transform: translate(-50%, -50%) scale(0.4);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(5);
                opacity: 0;
            }
        }

        /* Custom marker glow */
        .custom-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00aaff;
            border: 2px solid white;
            box-shadow:
                0 0 12px rgba(0,170,255,0.9),
                0 0 30px rgba(0,170,255,0.5);
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="coords">Click anywhere on the map</div>

<script>

    const imgWidth = 2000;
    const imgHeight = 1500;
    const imgUrl = 'https://github.com/davycwalker-debug/breakfast-and-battles/blob/main/faerun_medium.png?raw=true';

    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1,
        maxZoom: 5,
        zoomSnap: 0.25
    });

    const bounds = [[0, 0], [imgHeight, imgWidth]];
    L.imageOverlay(imgUrl, bounds).addTo(map);
    map.fitBounds(bounds);

    const markerStyles = {

        city: {
            color: "#ffd166",
            icon: "🏰",
            size: 26,
            glow: "rgba(255,209,102,0.8)"
        },
    
        town: {
            color: "#f4a261",
            icon: "🏠",
            size: 22,
            glow: "rgba(244,162,97,0.8)"
        },
    
        ruin: {
            color: "#9e9e9e",
            icon: "🪦",
            size: 24,
            glow: "rgba(180,180,180,0.7)"
        },
    
        forest: {
            color: "#2a9d8f",
            icon: "🌲",
            size: 24,
            glow: "rgba(42,157,143,0.8)"
        },
    
        swamp: {
            color: "#556b2f",
            icon: "🦟",
            size: 24,
            glow: "rgba(85,107,47,0.8)"
        },
    
        road: {
            color: "#c2b280",
            icon: "🛤️",
            size: 18,
            glow: "rgba(194,178,128,0.6)"
        },
    
        mountain: {
            color: "#8d99ae",
            icon: "⛰️",
            size: 28,
            glow: "rgba(141,153,174,0.8)"
        },
    
        region: {
            color: "#b5179e",
            icon: "🗺️",
            size: 30,
            glow: "rgba(181,23,158,0.8)"
        },
    
        dungeon: {
            color: "#d62828",
            icon: "⚔️",
            size: 26,
            glow: "rgba(214,40,40,0.8)"
        },
    
        body: {
            color: "#4cc9f0",
            icon: "🌊",
            size: 26,
            glow: "rgba(76,201,240,0.8)"
        },
    
        river: {
            color: "#4895ef",
            icon: "💧",
            size: 20,
            glow: "rgba(72,149,239,0.8)"
        },
    
        feature: {
            color: "#adb5bd",
            icon: "🪨",
            size: 24,
            glow: "rgba(173,181,189,0.8)"
        }
    };

    const layers = {

        encountered: {
            city: L.layerGroup(),
            town: L.layerGroup(),
            ruin: L.layerGroup(),
            forest: L.layerGroup(),
            swamp: L.layerGroup(),
            road: L.layerGroup(),
            mountain: L.layerGroup(),
            region: L.layerGroup(),
            dungeon: L.layerGroup(),
            body: L.layerGroup(),
            river: L.layerGroup(),
            feature: L.layerGroup()
        },
    
        unencountered: {
            city: L.layerGroup(),
            town: L.layerGroup(),
            ruin: L.layerGroup(),
            forest: L.layerGroup(),
            swamp: L.layerGroup(),
            road: L.layerGroup(),
            mountain: L.layerGroup(),
            region: L.layerGroup(),
            dungeon: L.layerGroup(),
            body: L.layerGroup(),
            river: L.layerGroup(),
            feature: L.layerGroup()
        }
    
    };

    const groupedOverlays = {

        "Encountered": {
            "Cities": layers.encountered.city,
            "Towns": layers.encountered.town,
            "Ruins": layers.encountered.ruin,
            "Forests": layers.encountered.forest,
            "Swamps": layers.encountered.swamp,
            "Roads": layers.encountered.road,
            "Mountains": layers.encountered.mountain,
            "Regions": layers.encountered.region,
            "Dungeons": layers.encountered.dungeon,
            "Bodies": layers.encountered.body,
            "Rivers": layers.encountered.river,
            "Features": layers.encountered.feature
        },
    
        "Unencountered": {
            "Cities": layers.unencountered.city,
            "Towns": layers.unencountered.town,
            "Ruins": layers.unencountered.ruin,
            "Forests": layers.unencountered.forest,
            "Swamps": layers.unencountered.swamp,
            "Roads": layers.unencountered.road,
            "Mountains": layers.unencountered.mountain,
            "Regions": layers.unencountered.region,
            "Dungeons": layers.unencountered.dungeon,
            "Bodies": layers.unencountered.body,
            "Rivers": layers.unencountered.river,
            "Features": layers.unencountered.feature
        }
    
    };

    function addMarker(type, encountered, y, x, title, notionUrl) {

        const style = markerStyles[type];
    
        const icon = L.divIcon({
            className: '',
            html: `
                <div style="
                    position: relative;
                    width: ${style.size}px;
                    height: ${style.size * 1.4}px;
                ">
                
                    <!-- Pin Body -->
                    <div style="
                        position:absolute;
                        width:${style.size}px;
                        height:${style.size}px;
                
                        background:${style.color};
                
                        border-radius:50% 50% 50% 0;
                
                        transform: rotate(-45deg);
                
                        box-shadow:
                            0 0 12px ${style.glow},
                            0 0 28px ${style.glow};
                
                        border:2px solid white;
                    "></div>
                
                    <!-- Icon -->
                    <div style="
                        position:absolute;
                
                        width:${style.size}px;
                        height:${style.size}px;
                
                        display:flex;
                        align-items:center;
                        justify-content:center;
                
                        font-size:${style.size * 0.55}px;
                
                        z-index:2;
                
                        transform: translateY(1px);
                    ">
                        ${style.icon}
                    </div>
                
                </div>
                `,
            iconSize: [style.size, style.size],
            iconAnchor: [style.size / 2, style.size * 1.4]
        });
    
        const marker = L.marker([y, x], {
            icon,
            riseOnHover: true
        });
    
        marker.bindPopup(`
            <div style="font-family:sans-serif;text-align:center;">
                <div style="
                    opacity:0.7;
                    text-transform:uppercase;
                    font-size:12px;
                    margin-bottom:5px;
                ">
                    ${type}
                </div>
    
                <h3>${title}</h3>
    
                <div style="
                    margin-bottom:10px;
                ">
                    ${encountered ? 'Encountered' : 'Unknown'}
                </div>
    
                <a href="${notionUrl}" target="_blank">
                    Open Entry ➔
                </a>
            </div>
        `);
    
        const state = encountered
            ? "encountered"
            : "unencountered";
    
        marker.addTo(layers[state][type]);
    
        return marker;
    }

    addMarker(
        "city",
        true,
        750,
        1000,
        "Capital City",
        "https://notion.so/page1"
    );
    
    addMarker(
        "dungeon",
        false,
        400,
        1300,
        "The Buried Crypt",
        "https://notion.so/page2"
    );
    
    addMarker(
        "mountain",
        true,
        250,
        700,
        "Iron Peaks",
        "https://notion.so/page3"
    );

    L.control.groupedLayers(
        null,
        groupedOverlays,
        {
            collapsed: false,
            groupCheckboxes: true
        }
    ).addTo(map);

    // PRETTY CLICK INTERACTION
    map.on('click', function(e) {

        // Update coordinate display
        document.getElementById('coords').innerHTML = `
            <strong>X:</strong> ${Math.round(e.latlng.lng)}
            &nbsp;&nbsp;
            <strong>Y:</strong> ${Math.round(e.latlng.lat)}
        `;

        // Ripple effect
        const point = map.latLngToContainerPoint(e.latlng);

        const ripple = document.createElement('div');
        ripple.className = 'click-ripple';

        ripple.style.left = point.x + 'px';
        ripple.style.top = point.y + 'px';

        document.body.appendChild(ripple);

        setTimeout(() => {
            ripple.remove();
        }, 800);

    });

</script>

</body>
</html>
