<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/breakfast-and-battles/favicon.ico">
    <title>Area 4: The Archer's Gallery</title>
</head>
<body>
    <div class="container">
        <div id="encounter-output"></div>
    </div>
    <script type="module">
        import { renderRoomTemplate } from '../../js/renderer.js';
        import '../../js/interactions.js';
        
        const roomData = {
          // ==========================================
          // CORE HEADER INFO
          // ==========================================
          
          "title": `Area 4: The Archer's Gallery`,

          // ==========================================
          // NARRATIVE & INITIAL ABILITY CHECKS
          // ==========================================
          
          "readAloud": `The secret door slides aside to reveal a narrow passage descending a flight of stairs before opening into a small, cold stone chamber. 
          Shafts of bright light cut through the dark, dust-moted air from a series of vertical arrow slits.
          Three heavily muscled orcs crowd around a low stone slab piled with greasy joints of meat.`,

          "environment": {
            "dimensions": `20 ft. x 25 ft. room, 15 ft. ceiling.`, 
            "illumination": `Dim light from the arrow slits mixed with heavy shadows.`, 
            
            "features": [
              {
                "name": `The Arrow Slits`,
                "desc": `These narrow openings command the entire external approach to Area 1 and Area 2. 
                Creatures firing through them enjoy Improved Cover (+8 AC, +4 to Reflex saves, improved evasion, and a +10 bonus on Hide checks).`
              }
            ],
            
            "doors": [
              {
                "location": `South Wall`,
                "desc": `A stone door leading down to Area 3 (The Rift Hall). From this side, the operating mechanism is entirely obvious and requires no check to open.`
              },
              {
                "location": `Northeast Wall (Secret)`,
                "desc": `A well-crafted stone door (DC 23 Search check) leading to Area 14 (Bunkroom). 
                The occupants are completely oblivious to this hidden structural passage and never utilize it.`
              }
            ]
          },

          "setupPositions": `The three orcs start grouped closely around the stone slab in the center of the room. 
          If an alarm was explicitly raised in Area 1 or 2, they are already tracking the arrow slits with bows drawn, 
          but they remain positioned to quickly wheel around and face the secret stairs if the door opens.`,
          
          "development": `If the party eliminates these archers and subsequently withdraws from the mountain to rest, the vacancy is heavily corrected. 
          They are replaced by three fresh orcs from Area 14, and Burdug herself (Area 9) moves up to oversee the defense, adding strategic spellcasting to the crossfire.`,

          "treasure": {
            "carried": `Each orc carries coinage totaling 4d6 sp and 1d10 gp and heavy iron medallions carved with the symbol of Bahgtru.`
          },

          "specialEvents": [
            {
              "title": `Overheard Arrogance`,
              "trigger": `If a PC approaches stealthily down the passage or listens through the secret plate before opening the door.`,
              "readAloud": `Their rumbling voices compete with the rush of the river behind the wall.`,
              "mechanics": [
                {
                  "type": `Listen Check`,
                  "dc": `14`,
                  "success": `You freeze in the shadows of the stairwell, pressing your spine flat against damp stone, holding your breath.<br><br>
                  The largest of them—a brute whose broad shoulders practically wedge against the low ceiling—tears a chunk of flesh from a bone. 
                  He swallows hard, leans a thick composite longbow against the wall, and wipes grease onto his bare thigh.<br><br>
                  'The best strength is the kind you're born with,' he grunts, the vibration traveling through the floorboards. 
                  'Old Yarrack used to scream until he was red in the face about connecting mind to muscle. 
                  Then Burdug tries to hand me a scrap of slate with drawings on it. Showing how an axe should swing. Strategy shit.'<br><br>
                  He snorts, spitting a bit of gristle toward the stairs. 'I threw it in the fire. Look at me. I'm bigger than both of them.'<br><br>
                  Across the slab, a second orc sips from a clay cup. His armor is meticulously polished, catching the sharp gray daylight.<br><br>
                  'You got lucky, Kark,' he says smoothly. 'You're big enough that nobody wanted to push you out the gate to feed the wolves. 
                  But luck doesn't keep you in the warm rooms when the chieftains start throat-cutting.'<br><br>
                  Kark rumbles a warning low in his throat, but the smooth-talking one merely tilts his cup.<br><br>
                  'While you were ignoring them, I spent three winters nodding along to Yarrack's speeches. Kept me off the outer ledge. 
                  Then I told Burdug her new tactics were visionary so she wouldn't curse my bedroll. 
                  When the ogre showed up, I was the first to hand the beast a torch. You have to know which way the gale blows before it rips the roof off.'<br><br>
                  The third orc, a scarred veteran with a holy symbol painted in dried blood across his breastplate, slams his fist onto the stone slab. The platters rattle.<br><br>
                  'The wind doesn't matter, Srog! Only the fist,' the veteran growls. 
                  'Might makes right. That is the only law Gruumsh carved into the dirt. Yarrack was the strongest, so I followed him. 
                  Then the Great Ulfe walked in and proved he had the true mass of a warlord. Yarrack stepped aside because he knew his blood would paint the floor otherwise.' 
                  He leans over the meat, his single eye fixed on Srog. 'I follow the apex.'<br><br>
                  Kark laughs, a deep, booming sound that echoes off the stone right in front of your face. He stretches his massive arms.<br><br>
                  'Exactly! Gar's right. The giant is big, he's lazy, and as long as I stay up here in the watchtower, out of the sun, eating his leftovers, 
                  he can claim he's blessed by whoever he wants. The old blood-feuds are dead.'<br><br>
                  Srog leans forward, his voice dropping to a harsh whisper.<br><br>
                  'Just don't get too comfortable, Kark. Ulfe is strong, yes, but he's blind to what's brewing in the lower levels. 
                  Yarrack is brooding in the north bunkroom with his old guard. And Burdug is still whispering in her corner. 
                  She's small, but that Ilneval-worship of hers means she's always looking for a flank.'<br><br>
                  Gar spits on the floor. 'Let the witch try. Her sorcerous tricks are an insult to a true warrior.<br><br>
                  If she crosses the Great Ulfe, the giant will turn her into paste.'<br><br>
                  Srog swirls his cup, a sharp smile cutting across his dark face. 'And if she succeeds, Gar? If her 'tricks' actually put the ogre in the dirt? What then?'<br><br>
                  Gar stiffens. His hand drops to the hilt of his falchion, the leather creaking in the sudden silence of the room.<br><br>
                  'Then she will have proven her might. The All-Father will have chosen a new vessel. 
                  I will follow her orders—until someone bigger comes along to cut her throat.'<br><br>
                  Kark reaches across the table, snatching the last joint of meat and shattering the tension.<br><br>
                  'Fascinating,' Kark mumbles around a mouthful, grease dripping down his chin.<br><br>
                  'You two keep worrying about who's going to stab who. Pass the ale-skin, Srog. Our shift doesn't end for another hour.'`,
                  "failure": `You hear deep, rumbling orc laughter and the heavy thud of meat being dropped onto stone, but the words are too muffled to discern.`
                }
              ]
            }
          ]
        };

        renderRoomTemplate('encounter-output', roomData);
    </script>
</body>
</html>
