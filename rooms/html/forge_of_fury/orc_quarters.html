    <script type="module">
        import { renderRoomTemplate } from '../../js/renderer.js';
        import '../../js/interactions.js';
        
        const roomData = {
          "title": `Area 11: Orc Quarters`,
          
          "readAloud": `The heavy wooden door to the northern store-cavern hangs slightly off its iron hinges, leaving a finger's width of open space. 
          Pressing your shoulder flat against the cold, damp rock face of the corridor, you peer into the gap.<br><br>
          The air venting through the crack is thick, hitting your nose with the scent of salted pork, stale sweat, and the pungent, musky reek of wet canine fur. 
          Barrels, crates, and sacks of foodstuffs line the walls of this chamber. 
          Among the loot, four oversized straw pallets and other simple furnishings show that this room now serves as a bunkroom.<br><br>
          Directly in your narrow line of sight stands a massive, heavily scarred orc. 
          He is completely silent and barefoot, his grease-stained leather trousers rolled to his calves. 
          He is frozen in a wide, punishing stance—one knee deeply bent at a right angle, his trailing leg locked straight behind him, 
          and both thick arms extended horizontally like the wings of a hunting hawk.<br><br>
          His face is a mask of absolute, sweating concentration; his jaw is clenched so hard his lower tusks quiver, 
          yet his chest rises and falls in slow, rhythmic measures.<br><br>
          Near the back wall, a bloated, thick-necked brute sits atop a grain sack, carving chunks from a cured ham with a heavy skinning knife. 
          He wipes his greasy fingers across his leather chest piece, the blood showing as a dark, oily smudge in your monochrome vision. He grunts.<br><br>
          'Yarrack's gray knees are probably locking up in the dark right now,' the brute sneers, tossing a rind of fat across the floor. 
          'Old fool spent thirty years telling us to feel the iron bind to the bone. Now look at him. 
          Hiding in the north corner like a kicked pup while the Great Ulfe eats his fill. Pure rot.'<br><br>
          Beside the grain sack, just out of your direct sight, a younger, leaner warrior speaks up. 
          You hear the harsh, rhythmic scritch-hiss of a sharpening stone scraping aggressively against the edge of a falchion.<br><br>
          'Rot is right, Krogh!' the younger one cracks, his voice jumping an octave. 
          'The old guard is soft. Same as those human dogs out by the trade roads. You see the way the soft-skins travel? 
          Double-layered mail, padded collars, hiding behind shields because their ribs crack if you look at them too hard. 
          If any of those human filth stepped inside this mountain, I'd peel their armor off and feed their pink meat to the crows piece by piece.'<br><br>
          The silent orc holding the stance doesn't break his form. 
          His arms remain perfectly level, but his single visible eye shifts sharply toward the sound of the younger warrior, flashing pale in the dark.<br><br>
          'You've never even seen the high roads, Durz,' the stanced orc says. His voice is flat, terrifyingly calm, and dripping with low, biting sarcasm. 
          'And if a human scout in a padded collar caught you swinging that falchion with your shoulder dropped like that, 
          he'd slide three inches of steel under your armpit before you finished your roar. Shut your mouth—and keep your stone flat. You're rounding that edge, you idiot.'<br><br>
          With a seamless display of balance, the scarred giant shifts his massive weight forward. 
          You instinctively hold your breath, pressing closer to the wood as he lifts his back leg straight into the air behind him, 
          plunging his torso forward until his spine is perfectly parallel to the floor—a single, massive pillar of muscle counterweighted over the stone.<br><br>
          A fourth orc, whom you can barely glimpse sitting on the edge of a straw pallet while oiling a composite longbow, lets out a loud, booming chuckle.<br><br>
          'He's got you there, Durz! The kid talks like a warlord but he nearly cut his own toe off during the last livestock raid. 
          Don't worry about the pink-skins, Durz. If they show up, we'll let you guard the grain sacks.'<br><br>
          Through the crack, you see the young one, Durz, shuffle into view. His face darkens, the rushing blood turning his light hide a deep, mottled black. 
          He looks to Krogh for support, quickly forced to nod along with the joke to save his face. 'Yeah. Yeah, right. Just... talking, Thrum. Just saying.'<br><br>
          Krogh doesn't laugh. He slams the skinning knife into the top of a nearby crate, the iron blade quivering. 
          He stands up, his massive chest puffed out, deliberately stepping into the center of the room to confront the balancing warrior.<br><br>
          'You've got a big mouth for a grunt who sat on his hands during both scrambles, Targ,' Krogh growls, his voice dropping into a dangerous, gravelly register. 
          'You didn't lift a finger for Yarrack, and you didn't bow to Burdug. You just watched. 
          Maybe the Great Ulfe would like to know why our star warrior doesn't like to follow orders. The ogre listens to me. 
          One word from my mouth, and he'll have your spine across his knee.'<br><br>
          Targ doesn't waver. Slowly, with deliberate control, he brings his torso back to a vertical line. 
          He draws his raised foot inward, pressing the sole of his bare foot high against his opposite inner thigh, locking himself into a stark, single-pillared stance. 
          His arms rise slowly above his head, fingers touching like the peak of a grim stone gateway. He looks down his flat nose at Krogh. 
          'The ogre listens to you because you smell like his hounds, Krogh,' Targ says softly, his voice cutting like a razor through the smoky air. 
          'You spend half your rotation scraping the dung out of Vak and Thrag's kennel and letting them lick the grease off your fingers so you can claim you're blessed. 
          Go back to your master. You missed a spot behind his ears.'<br><br>
          Krogh's hand flies to the hilt of his falchion, while Durz scrambles backward out of your view. 
          Thrum immediately stands up, slamming his heavy hand down onto the iron-bound crate between the two arguing orcs, forcing his massive frame into the space.<br><br>
          'Enough! Both of you,' Thrum barks, his tone firm, anchoring the room. 
          'The relief guard comes down from the gallery in an hour, and I'm not cleaning your blood off my bunk before I sleep. Krogh, take the meat to the commons. 
          Targ... whatever shit you're doing with your legs, do it without the barking.'<br><br>
          Krogh stares at Targ for three long seconds, his hot breath rattling in his throat, showing as brief, faint plumes of condensation in the cold air. 
          Slowly, he pulls his hand away from his blade, snatches the ham off the crate, and spits on the floor.<br><br>
          'He's a freak,' Krogh mutters. He turns his back, gesturing aggressively for Durz to follow him. The duo begin to walk towards your hidden position.<br><br>
          You hear Thrum sigh, followed by the familiar creak of his bowstring as he sits back down. 
          In the center of your narrow view, Targ doesn't watch the others leave. 
          He slowly lowers his arms, brings his foot back down to the cold stone, 
          and sinks right back into his deep, wide-legged stance—staring into the blank stone wall as if the rest of the mountain didn't even exist.`,

          "environment": {
            "dimensions": `30 ft. x 30 ft. room, 15 ft. ceiling`,
            "illumination": `No light`,
            
            "doors": [
              {
                "location": `West Wall`,
                "desc": `A wooden door (1 in. thick; hardness 5; hp 10; AC 5; break DC 18) leading to <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/orc_commons.html">Area 8 (Orc Commons)</a>.`
              }
            ]
          },

          "setupPositions": `4 orcs lounge around the room.`,

          "development": `If the characters raid the complex and depart, two of these orcs will be posted to <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/dwarf_door.html">Area 2 (The Dwarf-Door)</a> to guard the entrance of the dungeon against future attacks.`,
          
          "treasure": {
            "carried": `Each orc carries coinage totaling 4d6 sp and 1d10 gp.`,
            
            "containers": [
              {
                "name": `Iron Cauldron`,
                "contents": `The orcs have 210 gp stashed in an old iron cauldron hidden under one vermin-infested bed.`
              },
              {
                "name": `Bedding`,
                "contents": `A small pouch concealed in another orc's bedding contains a topazworth 200 gp and two onyx stones worth 50 gp each.`
              }
            ]
          }
        };

        renderRoomTemplate('encounter-output', roomData);
    </script>
