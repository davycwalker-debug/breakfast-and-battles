<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/breakfast-and-battles/favicon.ico">
    <title>Area 1: The End of the Trail</title>
</head>
<body>
    <div class="container">
        <div id="encounter-output"></div>
    </div>
    <script type="module">
        import { renderRoomTemplate } from '../../js/renderer.js';
        import '../../js/interactions.js';
        
        const roomData = {
          // ==========================================
          // CORE HEADER INFO
          // ==========================================
          
          "title": `Area 1: The End of the Trail`,

          // ==========================================
          // NARRATIVE & INITIAL ABILITY CHECKS
          // ==========================================
          
          "readAloud": `The mountain path climbs up one last, steep switchback toward a bare shoulder of rock. 
          The hillside rises sharply on your right, while a precipitous drop on your left offers a spectacular view of the jagged canyon floor far below. <br><br>
          Debris and rubbish lie scattered over the last hundred yards of the trail like the remnants of a poorly managed campsite. 
          Discarded waterskins, fragments of charred bone, and splintered kegs have been tossed carelessly over the cliffside. 
          Up ahead, the path opens onto a wide ledge before doubling back sharply into the darkness of the mountainside.<br><br>
          Two heavily muscled orcs in scale armor stand watch on the ledge. 
          They are completely inattentive, slouched over their weapons, 
          and radiating a level of profound boredom that suggests they are currently contemplating the sheer misery of their shift.`,
          
          "initialReadAloudChecks": [
            {
              "type": `Spot Check`, 
              "dc": `18`,           
              "prompt": `As you move around the corner onto the ledge...`, 
              "success": `you notice a row of cleverly hidden arrow slits in the rocky walls about 15 feet overhead. They are positioned nicely for a crossfire.`,
              "failure": `nothing stands out to you besides the scenic view.`
            },
            {
              "type": `Spot Check`,
              "dc": `13`,
              "prompt": `As you examine the east wall more closely...`, 
              "success": `you notice a row of cleverly hidden arrow slits in the rocky walls about 15 feet overhead.`,
              "failure": `nothing stands out to you.`
            },
            {
              "type": `Sense Motive`,
              "dc": `14`,
              "prompt": `Observing the guards' body language from a distance...`,
              "success": `The sentries exhibit a total lack of discipline. They aren't scanning the approach; 
              they are slumped heavily against the stone, moving with sluggish, fatigued physical reactions. 
              They look less like terrifying raiders and more like line talent who completely detest their assignment.`,
              "failure": `They look like standard, albeit exceptionally lazy, sentries.`
            }
          ],

          // ==========================================
          // ENVIRONMENT & ARCHITECTURE
          // ==========================================
          
          "environment": {
            "dimensions": `95 ft. x 10 ft. path opening up to a 35 ft. x 30 ft. ledge.`, 
            "illumination": `Sunlight.`, 
            
            "doors": [ 
              {
                "location": `South Ledge`,
                "desc": `The southern section of the ledge descends steeply through a deep cleft or fissure in the rock to Area 2 (The Dwarf-Door).`
              },
              {
                "location": `South Path`,
                "desc": `The old dwarf-path leads down a bare shoulder of rock to The Stone Tooth.`
              }
            ]
          },

          // ==========================================
          // COMBATANTS & COMBAT ENGINE DATA
          // ==========================================
          
          "setupPositions": `Wark and Thark are standing in the northwest corner of the ledge.
          They are in position to see the pathway leading up, 
          but are not paying attention and receive a -4 penalty to Spot and Listen checks.<br><br>
          Wark and Thark are not the only enemies here; 
          archers positioned in area 4 can freely take potshots at the characters.`,

          // ==========================================
          // STRATEGY & BEHAVIOR
          // ==========================================
          
          "development": `If attacked or confronted by more than one visible character without prior negotiation, 
          Wark and Thark call out a warning to the orcs in area 4 as soon as they get a chance to act.
          They stand their ground against one character, but flee to area 3 otherwise.
          If the characters are disguised as orcs, the two don't call out a warning until their second action comes up.`,

          // ==========================================
          // REWARDS, LOOT & CONTAINER ARRAYS
          // ==========================================
          
          "treasure": {
            "carried": `Each orc carries coinage totaling 4d6 sp and 1d10 gp. Thark also carries a small pouch containing stringy, sun-dried mountain lizard meat.`
          },

          // ==========================================
          // SPECIAL DYNAMIC TRIGGER CARDS
          // ==========================================
          
          "specialEvents": [
            {
              "title": `Overheard Griping`,
              "trigger": `If a PC approaches stealthily and spends a moment listening to the guards.`,
              "readAloud": `The two sentries speak in hushed, irritated guttural tones, entirely unaware that they have an audience.`,
              "mechanics": [
                {
                  "type": `Listen Check`,
                  "dc": `12`,
                  "success": `You manage to tune out the mountain wind and catch their low, grumbling conversation perfectly.`,
                  "failure": `The words are lost to the wind, sounding like general, low-intensity grumbling about work.`
                }
              ],
              "outcome": `On a success, read the following to the players:<br><br>
              <strong>Thark:</strong> "...still can't believe it. We're the ones who found him in the woods. We brought him here. 
              We told Yarrack, 'Look at the size of this guy, he's a total freak.' We practically handed him the tribe."<br><br>
              <strong>Wark:</strong> "And now we're pacing back and forth in the sun. I've been walking for six hours, Thark. 
              My legs feel like wet noodles. I'm practically evaporating."<br><br>
              <strong>Thark:</strong> "Exactly! He's a complete fraud. He doesn't even do anything! 
              He just sits in his quarters eating whole boars and baby-talking his stupid dogs while we're out here walking off our breakfast. 
              Yarrack made us carry literal boulders up the mountain and Burdug made us draw circles on the wall just to look at a barbell, 
              but at least they made us <em>do</em> something."<br><br>
              <strong>Wark:</strong> "Ulfe doesn't care about the grind. He just wants to pet his little puppies. 
              Honestly, if someone brought me a decent slab of cured venison right now, I'd let a whole army of Dwarves walk right past the slits. 
              I can't keep doing this cardio."`
            },
            {
              "title": `Exploiting the Low Totem Pole`,
              "trigger": `If a character steps out to openly parley or offer a bribe instead of initiating combat.`,
              "readAloud": `The two guards snap out of their slouch, shifting their weight awkwardly as their eyes lock onto you. 
              They handle their weapons with a mix of defensive hostility and a profound desire to be literally anywhere else.`,
              "mechanics": [
                {
                  "type": `Diplomacy Check`,
                  "dc": `16`,
                  "success": `The speaker handles the confrontation smoothly without triggering immediate panic. 
                  <strong>Circumstance Modifier:</strong> If the party successfully completed the 'Overheard Griping' check, 
                  and specifically tailors their offer to the guards' complaints (e.g., offering high-quality rations, luxury meats, or a purse of at least 15 gp), 
                  they receive a +4 circumstance bonus to this check.`,
                  "failure": `The guards grow paranoid that their blatant negligence will be spotted by the archers overhead in Area 4. 
                  Panicking, they draw weapons and sound the alarm.`
                }
              ],
              "outcome": `On a success, Wark and Thark grumble, step away from the ledge edge, and eagerly accept the offering. 
              Wark inspects the bribe, looks up at the sky, and sighs. 'You know what? I'm declaring this an unscheduled rest day.' <br><br>
              They deliberately decline to call out a warning to the archers in Area 4, allowing the party to pass down the southern ledge unmolested. 
              Before turning their attention entirely to the food, Thark spits over the edge and mutters, 
              'Watch yourself inside. The boss cares more about his pets than his actual soldiers. The whole camp is a powder keg right now.'`
            }
          ]
        };

        renderRoomTemplate('encounter-output', roomData);
    </script>
</body>
</html>
