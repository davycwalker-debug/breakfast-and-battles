<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/breakfast-and-battles/favicon.ico">
    <title>Area 2: The Dwarf-Door</title>
</head>
<body>
    <div class="container">
        <div id="encounter-output"></div>
    </div>
    <script type="module">
        import { renderRoomTemplate } from '../../js/renderer.js';
        import '../../js/interactions.js';
        
        const roomData = {
          "title": `Area 2: The Dwarf-Door`,

          "readAloud": `Broad, shallow steps track upward through a jagged, claustrophobic fissure before hooking sharply to the east. 
          Suddenly, the oppressive rock gives way to a grand, ancient entryway meticulously sheared into the heart of the mountain.<br><br>
          A set of majestic marble stairs—now cracked with age, veined with bright green moss, 
          and littered with a few crushed, empty ration tins—leads up to a massive double-door of deeply carved stone. 
          The portal is easily eight feet wide and stretches nearly ten feet high, looking every bit like a monument built to withstand an empire's collapse.<br><br>
          Unfortunately for you, two ominous arrow slits carved high into the northern and southern stone walls stare directly down at the landing, 
          commanding the entire approach with a textbook crossfire setup.`,

          "initialReadAloudChecks": [
            {
              "type": `Knowledge (Architecture) Check`,
              "dc": `12`,
              "prompt": `Examining the layout of the grand marble steps...`, 
              "success": `you realize the ancient builders deliberately designed these wide, uneven rises to completely disrupt a charging attacker's momentum. 
              Rushing up these stairs at full speed is a fantastic way to trip over your own boots.`,
              "failure": `the stairs look old, fancy, and annoying to climb.`
            }
          ],

          "environment": {
            "dimensions": `10 ft. x 30 ft. steep path opening up to 40 ft. x 30 ft. entrance.`, 
            "illumination": `Bright daylight spilling through the mountain cleft.`, 
            
            "features": [
              {
                "name": `The Grand Stairs`, 
                "desc": `The entire staircase layout acts as difficult terrain during combat. 
                The ancient dwarves didn't believe in letting guests arrive in a hurry.` 
              },
              {
                "name": `The Overlook Crossfire`, 
                "desc": `The arrow slits connect directly to <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/archers_gallery.html">Area 4 (The Archer's Gallery)</a> and <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/archers_gallery_a.html">Area 4a (The Archer's Gallery)</a>. 
                Creatures firing from behind them enjoy Improved Cover (+8 AC, +4 to Reflex saves, improved evasion, +10 bonus on Hide checks).<br><br>
                If the party takes care of Wark and Thark quietly, the orcs in <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/archers_gallery.html">Area 4 (The Archer's Gallery)</a> may not notice them at all. 
                Characters in disguise may pass to area 2 without danger, provided the orcs did not raise the alarm. 
                Characters who attempt to sneak past the row of arrow slits must attempt Move Silently checks with a +4 bonus (the orcs aren't paying attention). 
                To detect the sneaking characters, the orcs in <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/archers_gallery.html">Area 4 (The Archer's Gallery)</a> must equal or beat the worst Move Silently result achieved by the player characters.`
              }
            ],
            
            "doors": [
              {
                "location": `Northern Path`, 
                "desc": `The path descends through the rocky cleft, winding back around toward 
                <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/end_of_the_trail.html">Area 1 (The End of the Trail)</a>.` 
              },
              {
                "location": `East Wall`, 
                "desc": `A monumental double-door of solid carved stone leading into <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/rift_hall.html">Area 3 (The Rift Hall)</a>.<br><br>
                If the party successfully bribed, snuck past, or quietly incapacitated the sentries in <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/end_of_the_trail.html">Area 1 (The End of the Trail)</a>, 
                they arrive to find this grand stone gate standing wide open.<br><br>
                However, if the alarm was raised in <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/end_of_the_trail.html">Area 1 (The End of the Trail)</a>, or if the party stands around debating tactics in plain view of the arrow slits, 
                the orcs in <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/archers_gallery.html">Area 4 (The Archer's Gallery)</a> will curse loudly, slam the massive doors shut, and drop a heavy iron bar into place.<br><br>
                Once barred, getting inside is quite difficult. 
                A Strength check (DC 25) is necessary to force it. 
                A knock spell or an Open Lock check (DC 20) can lift the bar much more easily.` 
              }
            ]
          },
          
          "development": `Should the party botch the assault, retreat down the mountain to lick their wounds, 
          and try again later, security becomes much tighter. <br><br>
          Upon returning, the front door is shut. 
          Two reinforced orc sentries from <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/orc_quarters.html">Area 11 (Orc Quarters)</a> are now permanently posted on the marble landing. 
          Furthermore, Burdug herself moves up to <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/archers_gallery.html">Area 4 (The Archer's Gallery)</a> to personally manage the archers, adding some magical firepower to the crossfire. 
          Rushing the front door a second time won't be any easier.`
        };

        renderRoomTemplate('encounter-output', roomData);
    </script>
</body>
</html>
