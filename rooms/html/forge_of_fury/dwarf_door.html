<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/breakfast-and-battles/favicon.ico">
    <title>Area 2: The Dwarf-Door</title>
</head>
<body>
    <div class="container">
        <div id="encounter-output"></div>
    </div>
    <script type="module">
        import { renderRoomTemplate } from '../../js/renderer.js';
        import '../../js/interactions.js';
        
        const roomData = {
          // ==================================================================
          // CORE HEADER INFO
          // ==================================================================
          
          /* [Strict String] The main header text of the encounter area (e.g., Room Name).
             CRITICAL: This string acts as the exact unique primary key identifier used by 
             the JavaScript engine to match and pull monster data from CSV database files. */
          "title": `Area 2: The Dwarf-Door`,

          // ==================================================================
          // NARRATIVE & INITIAL ABILITY CHECKS
          // ==================================================================
          
          /* [Markdown/HTML String] Descriptive narrative flavor text meant to be read aloud by the DM.
             UI PRESENTATION: Renders inside a stylized boxed callout block with a green accent border.
             FORMATTING: Fully supports HTML inline text tags like <strong>, <em>, or links. */
          "readAloud": `Broad, shallow steps lead up a steep fissure to the 
          south and turn east into the mountainside. Here, a 
          broad entrance has been carved out of the stone. 
          Marble steps cracked with age and veined with green 
          moss lead up to a strong double-door of carved stone, 
          8 feet wide and almost 10 feet tall. Two arrow slits 
          high on the north and south walls command this area.`,

          // ==================================================================
          // ENVIRONMENT & ARCHITECTURE
          // ==================================================================
          
          /* [Object] Spatial parameters, illumination rules, and structural exits defining the physical layout. */
          "environment": {
            "dimensions": `10 ft. x 30 ft. steep path opening up to 40 ft. x 30 ft. entrance.`, // [String] Total physical layout metrics (e.g., "40 ft. x 40 ft. room, 15 ft. ceiling")
            "illumination": `Sunlight.`, // [String] Light state rules (e.g., "Darkness", "Bright light from wall torches")
            
            /* [Array of Objects] Points of interest, distinct architectural details, hazards, or furnishings.
               UI PRESENTATION: Formatted into a structured, clean-scannable bulleted layout. */
            "features": [
              {
                "name": `Shallow Steps`, // [String] The title of the feature or object (e.g., "Altar", "Rubbish Pile")
                "desc": `These shallow steps leading to the entryway prevent charging.`  // [Markdown String] Detailed description, physical attributes, or interaction limits
              },
              {
                "name": `Grand Steps`, // [String] The title of the feature or object (e.g., "Altar", "Rubbish Pile")
                "desc": `These grand steps up to the stone door prevent charging.`  // [Markdown String] Detailed description, physical attributes, or interaction limits
              }
            ],
            
            /* [Array of Objects] Portals, doorways, secret paths, or passages leading out of this environment. */
            "doors": [
              {
                "location": `Northern Path`, // [String] Cardinal direction or spatial point (e.g., "North Door", "Secret Floor Trapdoor")
                "desc": `The northern section of the path ascends steeply through a deep cleft or fissure in the rock to Area 1 (The End of the Trail).`      // [Markdown String] Structural materials, locking mechanisms, lockpick/strength DCs, or destination
              },
              {
                "location": `East Wall`, // [String] Cardinal direction or spatial point (e.g., "North Door", "Secret Floor Trapdoor")
                "desc": `Strong double-door of carved stone, 
                8 feet wide and almost 10 feet tall, leading to Area 3 (The Rift Hall). 
                If the characters silenced the orcs in area 1 and moved 
                past the orcs in area 4 by using stealth or a disguise, they 
                find the door at the top of the marble stairs standing open.<br><br>
                On the other hand, if the characters allow the orcs in 
                area 4 to discover their presence and don't move quickly to 
                reach the door, the orcs shut it in their faces. 
                Opening the door once it has been shut is very hard, as it is barred on 
                the other side. A Strength check (DC 25) is necessary to 
                force it. A knock spell or an Open Lock check (DC 20) can 
                lift the bar much more easily.`      // [Markdown String] Structural materials, locking mechanisms, lockpick/strength DCs, or destination
              }
            ]
          },
          
          /* [Markdown String] (Optional) Eventualities, long-term consequences, reinforcement arrivals, or aftermath.
             UI PRESENTATION: Automatically wrapped inside a clean, distinctive dashed-border development layout block. */
          "development": `The characters may be repelled in their 
          attack. If they leave and return later, two orcs from area 11 
          are now in this area, standing watch, while Burdug 
          moves to area 4 in order to add to the 
          firepower of the orcs on watch there. It doesn't get any 
          easier for the characters to rush the Mountain Door on 
          subsequent tries!`
        };

        renderRoomTemplate('encounter-output', roomData);
    </script>
</body>
</html>
