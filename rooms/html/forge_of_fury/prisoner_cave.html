        const roomData = {
          "title": `Area 6: Prisoner Cave`,

          "readAloud": `A row of rough-hewn sapling trunks forms a crude but serviceable cage across the mouth of this small cave.

          "Thank Yondalla!" the first one cries out. "We're rescued!`,

          "environment": {
            "dimensions": `15 ft. x 15 ft. cave, 10 ft. ceiling`,
            "illumination": `No light.`,

            "doors": [
              {
                "location": `Northern Cage Door (Locked)`,
                "desc": `Opening the cage door to <a href="https://davycwalker-debug.github.io/breakfast-and-battles/rooms/html/forge_of_fury/orc_cave.html">Area 5 (Orc Cave)</a> requires an Open Lock check (DC 13), the key from Old Yarrack's pocket, or a sharp axe and a little time.`
              }
            ]
          },

          "development": `Any characters captured by the orcs eventually wind up in the cage here, unless they demonstrate that they're too much trouble to be left alive.`,

          "additionalSections": [
            {
              "heading": `Escort Mission`, // [String] Custom layout section title line.
