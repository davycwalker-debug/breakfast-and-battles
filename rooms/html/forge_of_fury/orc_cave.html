          "readAloud": `This chamber is a natural cave with carefully smoothed walls and floor.

          The room is littered with orcish sleeping furs, loot, and rubbish. 
          As you enter, two humans jump up from where they were curled up on the floor behind the wooden cage and begin crying for help.`,

          "environment": {
            "dimensions": `45 ft. x 25 ft. cave, 45 ft. ceiling`,

            "doors": [
              {
                "location": `West Wall`,
                "desc": `A wooden door (1 in. thick; hardness 5; hp 10; AC 5; break DC 18) leading to Area 3 (The Rift Hall).`
              },
              {
                "location": `North Hallway`,
                "desc": `This hallway leads to Area 8 (Orc Commons).`
              },
              {
                "location": `South Cage Door (Locked)`,
                "desc": `Opening the cage door to Area 6 (Prisoner Cave) requires an Open Lock check (DC 13), the key from Old Yarrack's pocket, or a sharp axe and a little time.`
              },
              {
                "location": `Southeast Hallway`,
                "desc": `This hallway leads to Area 7 (The Chimney).` 
              },
              {
                "location": `Northeast Hallway`,
                "desc": `This hallway leads to Area 8 (Orc Commons).`
              }
            ]
          },

          "treasure": {

              {
                "name": `Crates and Sacks`,

                Additionally, if characters are held captive in area 6, their equipment rests within an unlocked chest here.`

            ]
          }
        };

        renderRoomTemplate('encounter-output', roomData);
