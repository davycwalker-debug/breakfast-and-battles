<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/breakfast-and-battles/favicon.ico">
    <title>Area 4a: The Archer's Gallery</title>
</head>
<body>
    <div class="container">
        <div id="encounter-output"></div>
    </div>
    <script type="module">
        import { renderRoomTemplate } from '../../js/renderer.js';
        import '../../js/interactions.js';
        
        const roomData = {
          // ==========================================
          // CORE HEADER INFO
          // ==========================================
          
          "title": `Area 4a: The Archer's Gallery`,

          // ==========================================
          // NARRATIVE & INITIAL ABILITY CHECKS
          // ==========================================
          
          "readAloud": `The secret door slides aside to reveal a narrow passage descending a flight of stairs before opening into a small, cold stone chamber. 
          Shafts of bright light cut through the dark, dust-moted air from a series of vertical arrow slits.
          At the foot of the steps, a single scarred orc stands in the center of the room. 
          He does not reach for his weapon; instead, his lone eye tracks your movement with cold calculation.<br><br>
          He steps forward, lowers his voice, and says: 
          'You look like killers, and I have an ogre that needs killing. Stand easy, or draw your steel and die in the dark.'`,

          "environment": {
            "dimensions": `20 ft. x 25 ft. room, 15 ft. ceiling.`, 
            "illumination": `Dim light from the arrow slits mixed with heavy shadows.`, 
            
            "features": [
              {
                "name": `The Arrow Slits`,
                "desc": `These narrow openings command the entire external approach to Area 1 and Area 2. 
                Creatures firing through them enjoy Improved Cover (+8 AC, +4 to Reflex saves, improved evasion, and a +10 bonus on Hide checks).`
              }
            ],
            
            "doors": [
              {
                "location": `North Wall`,
                "desc": `A stone door leading down to Area 3 (The Rift Hall). From this side, the operating mechanism is entirely obvious and requires no check to open.`
              }
            ]
          },

          "dialogueTree": [
            {
              "prompt": `If the party asks about a peaceful solution:`,
              "speaker": `Gork`,
              "response": `He stares down his tusks, a look of profound, primal disgust crossing his scarred features. He spits at your feet.<br><br>
              'Keep your small tongue behind your teeth. The All-Father did not carve these valleys with kind words. He did it with an iron spear and a river of blood. 
              There is no peace in the Mountain Door. There is only the master and the slave. If you do not want to bleed, stand behind your betters while we gut the giant.'`
            },
            {
              "prompt": `If the players point out that the giant is stronger/bigger than him:`,
              "speaker": `Gork`,
              "response": `He blinks, grunting in rough, practical approval.<br><br>
              'The giant is big, yes—but he is an ogre. A lesser beast. Gruumsh gave the world to the orcs, not the monsters. 
              My mass is pure; my blood is chosen. When the ogre dies, the apex returns to the true line. 
              If your teeth are sharp enough to help me tear his throat out, you will eat your fill from his stores.'`
            },
            {
              "prompt": `If the party asks about Ulfe:`,
              "speaker": `Gork`,
              "response": `He grinds his teeth, knuckles whitening on his weapon.<br><br>
              'Six hundred pounds of stupid meat. He does not think; he only reacts. Speak too loud, and he breaks your back. 
              He keeps two massive worgs at his heels—Vak and Thrag. They are smarter than he is. 
              He sits in his little throne room, rotting like a fallen log, while the true blood of Gruumsh wastes away on guard duty. 
              He must be put down like a rabid bull.'`
            },
            {
              "prompt": `If the party asks about Yarrack:`,
              "speaker": `Gork`,
              "response": `He rolls his eyes, exhaling a harsh breath.<br><br>
              'A fossil who bows to Bahgtru. Bahgtru is the arm of the All-Father, the heavy fist—he is not the brain. 
              Yarrack wants us to lift rocks and shout about 'mind-connections' until our veins burst, but he has no divine vision. 
              He let an ogre take his crown without a fight because his knees are gray. A true chieftain dies on his feet, spitting blood in the usurper's eye.'`
            },
            {
              "prompt": `If the party asks about Burdug:`,
              "speaker": `Gork`,
              "response": `He scoffs, waving a dismissive hand.<br><br>
              'Burdug is a plague. She worships Ilneval, the strategist, but she uses his name to cover her own weakness. 
              She is small, built like a human wench, so she tells the warriors that 'angles' and 'leverage' matter more than raw, holy might. 
              She tried a coup and failed because nobody follows a chief they can throw over a wall. 
              Then she brought the ogre in to be her puppet, and the beast stepped on her strings.'`
            },
            {
              "prompt": `If the party asks about what he's proposing:`,
              "speaker": `Gork`,
              "response": `He leans in, his single eye fixed intently on the party.<br><br>
              'Simple. You are killers; I see the grease of battle on your gear. 
              Bypass the main gallery and slaughter Great Ulfe and his dogs. 
              I stay here, ensure the relief guard doesn't catch you from behind, and when the ogre's head rolls down the corridor, I claim the throne. 
              Yarrack and Burdug will bow, or they will join the giant in the ditch.'`
            },
            {
              "prompt": `If the party asks about previous orc casualties caused by the party:`,
              "speaker": `Gork`,
              "response": `He shrugs indifferently, his eye tracking the edge of your weapons.<br><br>
              'Who'd you kill? Thark? Wark? Vren? Cowards who couldn't keep their eyes open. Their blood was weak, so it pooled in the dirt. 
              The All-Father weeds his garden. 
              So long as you leave me enough blades to hold the gates—at least a dozen—I do not care how many unaligned fools you gut on your way to the high room.'`
            },
            {
              "prompt": `If the party asks about the layout:`,
              "speaker": `Gork`,
              "response": `He points a thick, scarred finger to the east.<br><br>
              'Back where you came, the passage leads through the commons to a crossroad. One side is the main barracks. 
              Avoid it if you want to keep your skin whole. The other leads to where the brute sleeps. 
              Yarrack holds the north bunkroom past that, but if you go quietly, the old man won't even hear you.'`
            },
            {
              "prompt": `If the party asks about guard rotation:`,
              "speaker": `Gork`,
              "response": `He motions vaguely to the north.<br><br>
              'The fools in the main gallery are stuffing their faces with goat meat. They have another hour before the relief squad swaps places. 
              Move now, and you can slip through the dark before the halls get busy. Linger, and you'll have eight longbows pointed at your ribs.'`
            },
            {
              "prompt": `If the party asks what happens to Yarrack and Burdug after the coup:`,
              "speaker": `Gork`,
              "response": `He smiles, tapping the scar over his empty eye socket.<br><br>
              'They will serve the Eye, as they were meant to. 
              Yarrack will train the young blood, breaking their bones until they are hard as iron—under my command. 
              Burdug will sit in her dark room, drawing her little maps and advising me on where the human trade caravans march. 
              They will be the lieutenants. I will be the fist.'`
            },
            {
              "prompt": `If the party demands payment upfront:`,
              "speaker": `Gork`,
              "response": `He snarls, tapping a heavy leather pouch at his belt.<br><br>
              'I have the location of the dwarven trap mechanism, and I have thirty silver pieces minted in the old kingdoms. 
              That is your down payment. The rest is in Ulfe's chest. The giant keeps the tribute from the Bandit Wastes scattered on his floor. 
              Kill him, take his gold, take his magic baubles. I only want the crown.'`
            },
            {
              "prompt": `If the party threatens him:`,
              "speaker": `Gork`,
              "response": `He drops his bow, drawing his falchion with a terrifyingly calm, slow scrape of steel.<br><br>
              'You could try. But I am an orc of the Eye, and I do not fear the dark. 
              Before your steel cleaves my chest, I will bellow a war-cry that brings twelve Orcs from the commons down this hallway like a flood of iron. 
              You will die in a narrow chute, choked on your own blood. Or, we make a deal, and we both get what we want.'`
            },
            {
              "prompt": `If the party asks why he doesn't challenge Ulfe himself:`,
              "speaker": `Gork`,
              "response": `He bares his teeth and starts forward, then visibly restrains himself.<br><br>
              'Because I am not an idiot like Kark. A challenge requires the tribe to watch. 
              If I challenge him openly, his two worgs will tear my legs off before I can swing, and the cowards will cheer because they fear him. 
              I need the beast weakened, or his throat cut while he sleeps. Divine right doesn't make my hide immune to an ogre's club.'`
            },
            {
              "prompt": `If the party asks about prisoners:`,
              "speaker": `Gork`,
              "response": `He pauses, his brow furrowing as if struggling to comprehend the question.<br><br>
              'There are a couple human scum rotting in the lower pens. Weak, starved, terrified. They cannot help you lift a sword, let alone fight an ogre. 
              If you want to waste your time cutting their ropes, do it *after* the giant is dead. Right now, they are just meat waiting for the pot.'`
            },
            {
              "prompt": `If the party asks for a guide:`,
              "speaker": `Gork`,
              "response": `He shakes his head firmly, gesturing toward the door you came through.<br><br>
              'No. If I leave my post, Srog or Gar will notice. If they see me marching with an elf, a lizard, and a gnome toward the chief's room, the alarm goes up. 
              My job is to keep this flank quiet. I stay here, I cover your retreat, and I ensure the barracks stay asleep while you do the cutting.'`
            },
            {
              "prompt": `If the party accepts his terms:`,
              "speaker": `Gork`,
              "response": `He nods once, a grim, bloodthirsty smile spreading across his tusks as he shears his blade back into its scabbard.<br><br>
              'May the Eye guide your steel into his liver. Go through the secret door, follow the northern corridor past the statue, and hit him hard before he can call his hounds. 
              When it is done, bring me his ears.'`
            }
          ],

          "setupPositions": `A single orc stands near the stone slab in the center of the room. 
          If an alarm was explicitly raised in Area 1 or 2, he is tracking the arrow slits with his bow drawn, 
          but remains positioned to quickly wheel around and face the secret stairs if the door opens.`,
          
          "development": `If the party eliminates this archer and subsequently withdraws from the mountain to rest, the vacancy is heavily corrected. 
          He is replaced by one fresh orc from Area 14.`,

          "treasure": {
            "carried": `Gork carries coinage totaling 30+4d6 sp and 1d10 gp.`
          }
        };

        renderRoomTemplate('encounter-output', roomData);
    </script>
</body>
</html>
